services:

  # ── Databases ──────────────────────────────────────────────────────────────

  auth-db:
    image: postgres:15
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devalert-network

  monitor-db:
    image: postgres:15
    environment:
      POSTGRES_DB: monitordb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - monitor-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monitordb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devalert-network

  notify-db:
    image: postgres:15
    environment:
      POSTGRES_DB: notifydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - notify-db-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devalert-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - devalert-network

  # ── Services ───────────────────────────────────────────────────────────────

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/authdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: change-this-to-a-long-random-secret-key
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devalert-network

  monitor-service:
    build: ./monitor-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://monitor-db:5432/monitordb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: change-this-to-a-long-random-secret-key
      AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      monitor-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - devalert-network

  notify-service:
    build: ./notify-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://notify-db:5432/notifydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: secret
      AUTH_SERVICE_URL: http://auth-service:8081
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: your@gmail.com
      SPRING_MAIL_PASSWORD: your-gmail-app-password
    depends_on:
      notify-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - devalert-network

# ── Volumes ─────────────────────────────────────────────────────────────────

volumes:
  auth-db-data:
  monitor-db-data:
  notify-db-data:

# ── Networks ─────────────────────────────────────────────────────────────────

networks:
  devalert-network:
    driver: bridge